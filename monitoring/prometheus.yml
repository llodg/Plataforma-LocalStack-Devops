global:
  scrape_interval: 5s

scrape_configs:

  - job_name: "app"
    static_configs:
      - targets: ["app:5000"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

rule_files:
  - "alert.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]